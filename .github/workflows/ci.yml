name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  racket:
    name: Racket (raco test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Bogdanp/setup-racket@v1.11
        with:
          version: stable
          variant: CS
          distribution: full
      - name: raco test all solutions
        run: raco test $(find . -name '*.rkt' | sort)

  haskell:
    name: Haskell (runghc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.6'
      - name: Install logict and expose bundled libraries
        run: |
          cabal update
          cabal install --lib logict parsec mtl array containers \
            --constraint 'parsec installed'     \
            --constraint 'mtl installed'        \
            --constraint 'array installed'      \
            --constraint 'containers installed'
      - name: Run every Haskell solution
        run: |
          status=0
          for f in $(find . -name '*.hs' | sort); do
            echo "== $f =="
            runghc "$f" || status=1
          done
          exit $status

  idris2:
    name: Idris 2 (--check)
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - uses: actions/checkout@v4
      - name: idris2 --check every solution
        run: |
          status=0
          for f in $(find . -name '*.idr' | sort); do
            echo "== $f =="
            idris2 --check "$f" || status=1
          done
          exit $status

  lean:
    name: Lean 4 (lean check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean (elan, toolchain from ./lean-toolchain)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/download/v4.0.0/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Check every Lean solution (and its #guard tests / proofs)
        run: |
          status=0
          for f in $(find . -name '*.lean' | sort); do
            echo "== $f =="
            lean "$f" || status=1
          done
          exit $status

  agda:
    name: Agda (type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4.3'
      - name: Install agda-stdlib 2.1 and register it as the default library
        run: |
          curl -sSfL https://github.com/agda/agda-stdlib/archive/refs/tags/v2.1.tar.gz | tar -xz
          mkdir -p ~/.agda
          echo "$PWD/agda-stdlib-2.1/standard-library.agda-lib" > ~/.agda/libraries
          echo standard-library > ~/.agda/defaults
      - name: Type-check every Agda solution (and its refl tests / proofs)
        run: |
          status=0
          for f in $(find . -name 'solution.agda' | sort); do
            echo "== $f =="
            agda -i "$(dirname "$f")" "$f" || status=1
          done
          exit $status
